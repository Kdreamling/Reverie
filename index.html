<!doctype html>
<html lang="zh" style="background:#FDFAF6">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/chat/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <link rel="manifest" href="/chat/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Reverie" />
    <meta name="theme-color" content="#FDFAF6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <title>Reverie</title>
    <style>
      /* Splash shown before React mounts — replaced when root renders */
      #splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 18px;
        background: #FDFAF6;
        animation: splash-in 0.6s ease-out;
      }
      #splash .wordmark {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 26px;
        letter-spacing: 0.22em;
        color: #A0785A;
        opacity: 0.85;
      }
      #splash .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: #C49A78;
        animation: splash-breathe 1.6s ease-in-out infinite;
      }
      @keyframes splash-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes splash-breathe {
        0%, 100% { opacity: 0.25; transform: scale(1); box-shadow: 0 0 6px 2px rgba(196,154,120,0.1); }
        50% { opacity: 0.9; transform: scale(1.35); box-shadow: 0 0 14px 5px rgba(196,154,120,0.25); }
      }
    </style>
  </head>
  <body style="background:#FDFAF6">
    <div id="root">
      <div id="splash">
        <div class="wordmark">Reverie</div>
        <div class="dot"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
