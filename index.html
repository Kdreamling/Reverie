<!doctype html>
<html lang="zh" style="background:#FDFAF6">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/chat/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <link rel="manifest" href="/chat/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Reverie" />
    <meta name="theme-color" content="#FDFAF6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <title>Reverie</title>
    <style>
      /* Splash shown before React mounts — replaced when root renders.
         iOS14 兼容：不用 inset / flex gap（14.0-14.4 不支持），全部用老式定位 */
      #splash {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #FDFAF6;
        animation: splash-in 0.6s ease-out;
      }
      /* 水面：一粒光点落下，两圈涟漪缓缓荡开 */
      #splash .pond {
        position: absolute;
        top: 50%; left: 50%;
        width: 0; height: 0;
      }
      #splash .core {
        position: absolute;
        top: -4px; left: -4px;
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #C49A78;
        animation: splash-core 2.4s ease-in-out infinite;
      }
      #splash .ring {
        position: absolute;
        top: -40px; left: -40px;
        width: 80px; height: 80px;
        border-radius: 50%;
        border: 1px solid rgba(196,154,120,0.45);
        opacity: 0;
        -webkit-transform: scale(0.15);
        transform: scale(0.15);
        animation: splash-ripple 2.4s cubic-bezier(0.25,0.6,0.4,1) infinite;
      }
      #splash .ring2 { animation-delay: 0.8s; }
      @keyframes splash-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes splash-core {
        0%, 100% { opacity: 0.5; -webkit-transform: scale(1); transform: scale(1); }
        18% { opacity: 1; -webkit-transform: scale(1.25); transform: scale(1.25); }
      }
      @keyframes splash-ripple {
        0%   { opacity: 0;    -webkit-transform: scale(0.15); transform: scale(0.15); }
        15%  { opacity: 0.55; }
        100% { opacity: 0;    -webkit-transform: scale(1); transform: scale(1); }
      }
    </style>
  </head>
  <body style="background:#FDFAF6">
    <div id="root">
      <div id="splash">
        <div class="pond">
          <div class="ring"></div>
          <div class="ring ring2"></div>
          <div class="core"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
